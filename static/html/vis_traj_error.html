<script>
(function() {
  const plot = document.getElementById('trajectory-error-plot');
  if (!plot) return;

  const demoTraceIndex = 0;
  const errorTraceIndex = 19;
  const highlightColor = "#dc2626";
  const highlightStroke = "#991b1b";
  let highlightedPath = null;
  let highlightedFill = null;
  let highlightedStroke = null;
  let highlightedStrokeWidth = null;

  function getBarPaths() {
    const errorTrace = plot.data && plot.data[errorTraceIndex];
    const expectedBars = errorTrace && errorTrace.x ? errorTrace.x.length : 0;
    const traces = plot.querySelectorAll(".barlayer .trace");
    for (const trace of traces) {
      const paths = trace.querySelectorAll("path");
      if (paths.length >= expectedBars) {
        return paths;
      }
    }
    return [];
  }

  function clearHighlighted() {
    if (!highlightedPath) return;
    if (highlightedFill === null) {
      highlightedPath.style.removeProperty("fill");
    } else {
      highlightedPath.style.fill = highlightedFill;
    }
    if (highlightedStroke === null) {
      highlightedPath.style.removeProperty("stroke");
    } else {
      highlightedPath.style.stroke = highlightedStroke;
    }
    if (highlightedStrokeWidth === null) {
      highlightedPath.style.removeProperty("stroke-width");
    } else {
      highlightedPath.style.strokeWidth = highlightedStrokeWidth;
    }
    highlightedPath = null;
    highlightedFill = null;
    highlightedStroke = null;
    highlightedStrokeWidth = null;
  }

  function setHighlighted(localTimestep) {
    clearHighlighted();
    if (!Number.isInteger(localTimestep)) return;
    const paths = getBarPaths();
    if (localTimestep < 0 || localTimestep >= paths.length) return;
    highlightedPath = paths[localTimestep];
    highlightedFill = highlightedPath.style.fill || null;
    highlightedStroke = highlightedPath.style.stroke || null;
    highlightedStrokeWidth = highlightedPath.style.strokeWidth || null;
    highlightedPath.style.fill = highlightColor;
    highlightedPath.style.stroke = highlightStroke;
    highlightedPath.style.strokeWidth = "1px";
  }

  plot.on("plotly_hover", function(eventData) {
    const point = eventData.points && eventData.points[0];
    if (!point || point.curveNumber !== demoTraceIndex || !point.customdata) return;
    setHighlighted(Number(point.customdata[0]));
  });

  plot.on("plotly_unhover", function() {
    clearHighlighted();
  });
})();
</script>
